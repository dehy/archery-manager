date.timezone = "Europe/Paris"
short_open_tag = off
memory_limit = 256M
max_execution_time = 30
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

display_errors = off
display_startup_errors = off
log_errors = on

post_max_size = 100M
upload_max_filesize = 100M

; Sessions are stored in /app/var/sessions, owned by the symfony user.
; This avoids permission issues with the default /var/lib/php/sessions
; directory which may be owned by root when using Docker named volumes.
session.save_path = /app/var/sessions
